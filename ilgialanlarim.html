<body class="d-flex flex-column min-vh-100 theme-ilgialanlarim">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Beyza</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Hakkında</a></li>
                    <li class="nav-item"><a class="nav-link" href="ozgecmis.html">Özgeçmiş</a></li>

                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-5">
        <header class="text-center mb-5">
            <h1 class="display-4 text-primary">Favori Müzik Albümlerim</h1>
            <p class="lead">Bu sayfadaki veriler anlık olarak iTunes API servisi üzerinden çekilmektedir.</p>
        </header>

        <div class="row" id="api-sonuclari">
            <div class="col-12 text-center" id="yukleniyor">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Yükleniyor...</span>
                </div>
                <p class="mt-2">Müzikler çekiliyor...</p>
            </div>
        </div>
    </main>

    <footer class="text-center py-4 mt-auto border-top border-dark">
        <p>&copy; 2026 Beyza Koyun - Tüm Hakları Saklıdır.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            fetch('https://itunes.apple.com/search?term=coldplay&entity=album&limit=4')
                .then(response => response.json())
                .then(data => {
                    const sonucAlani = document.getElementById('api-sonuclari');
                    sonucAlani.innerHTML = '';
                    data.results.forEach(album => {
                        const resim = album.artworkUrl100.replace('100x100bb', '300x300bb');
                        const sanatci = album.artistName;
                        const albumAdi = album.collectionName;
                        const tur = album.primaryGenreName;
                        const kart = `
                            <div class="col-md-3 mb-4">
                                <div class="card h-100 shadow-sm border-0">
                                    <img src="${resim}" class="card-img-top rounded-top" alt="${albumAdi}">
                                    <div class="card-body">
                                        <h5 class="card-title text-truncate" title="${albumAdi}">${albumAdi}</h5>
                                        <p class="card-text text-muted mb-1">${sanatci}</p>
                                        <span class="badge bg-secondary">${tur}</span>
                                    </div>
                                </div>
                            </div>
                        `;
                        sonucAlani.innerHTML += kart;
                    });
                })
                .catch(error => {
                    console.error('API Hatası:', error);
                    document.getElementById('yukleniyor').innerHTML = '<p class="text-danger">Veriler çekilirken bir hata oluştu.</p>';
                });
        });
    </script>
</body>
</html>
