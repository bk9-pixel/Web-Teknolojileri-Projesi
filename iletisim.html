    <!-- NATIVE JAVASCRIPT KODLARI -->
    <script>
      function nativeJSKontrol() {
        const isim = document.getElementById("isim").value.trim();
        const soyisim = document.getElementById("soyisim").value.trim();
        const email = document.getElementById("email").value.trim();
        const telefon = document.getElementById("telefon").value.trim();
        const mesaj = document.getElementById("mesaj").value.trim();
        const onay = document.getElementById("onay").checked;

        let hatalar = [];

        if (isim === "") hatalar.push("Adınızı girmeyi unuttunuz.");
        if (soyisim === "") hatalar.push("Soyadınızı girmeyi unuttunuz.");

        const emailSabloni = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (email === "") {
          hatalar.push("E-posta adresinizi girmeyi unuttunuz.");
        } else if (!emailSabloni.test(email)) {
          hatalar.push("Lütfen geçerli bir e-posta adresi girin.");
        }

        // Sadece Rakam Kontrolü
        const telefonSabloni = /^[0-9]+$/;
        if (telefon === "") {
          hatalar.push("Telefon numaranızı girmeyi unuttunuz.");
        } else if (!telefonSabloni.test(telefon)) {
          hatalar.push("Telefon numarası sadece rakamlardan oluşmalıdır.");
        }

        if (mesaj === "") hatalar.push("Mesaj alanını boş bırakamazsınız.");

        if (!onay) hatalar.push("Kişisel verilerinizin işlenmesini onaylamalısınız.");

        if (hatalar.length > 0) {
          alert("[NATIVE JS KONTROLÜ] Lütfen eksikleri tamamlayın:\n\n- " + hatalar.join("\n- "));
        } else {
          document.getElementById("iletisimFormu").submit();
        }
      }
    </script>

    <!-- VUE.JS KODLARI -->
    <script>
      const { createApp } = Vue;

      createApp({
        data() {
          return {
            isim: "",
            soyisim: "",
            email: "",
            telefon: "",
            sehir: "",
            cinsiyet: "",
            mesaj: "",
            onay: false,
          };
        },
        methods: {
          vueIleDenetle() {
            let vueHatalar = [];

            if (!this.isim) vueHatalar.push("Adınızı girmeyi unuttunuz.");
            if (!this.soyisim) vueHatalar.push("Soyadınızı girmeyi unuttunuz.");

            const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!this.email) {
              vueHatalar.push("E-posta adresinizi girmeyi unuttunuz.");
            } else if (!regex.test(this.email)) {
              vueHatalar.push("Lütfen geçerli bir e-posta adresi girin.");
            }

            // Sadece Rakam Kontrolü
            const telRegex = /^[0-9]+$/;
            if (!this.telefon) {
              vueHatalar.push("Telefon numaranızı girmeyi unuttunuz.");
            } else if (!telRegex.test(this.telefon)) {
              vueHatalar.push("Telefon numarası sadece rakamlardan oluşmalıdır.");
            }

            if (!this.mesaj) vueHatalar.push("Mesaj alanını boş bırakamazsınız.");

            if (!this.onay) vueHatalar.push("Kişisel verilerinizin işlenmesini onaylamalısınız.");

            if (vueHatalar.length > 0) {
              alert("[VUE.JS KONTROLÜ] Lütfen eksikleri tamamlayın:\n\n- " + vueHatalar.join("\n- "));
            } else {
              document.getElementById("iletisimFormu").submit();
            }
          },
          formuTemizle() {
            this.isim = "";
            this.soyisim = "";
            this.email = "";
            this.telefon = "";
            this.sehir = "";
            this.cinsiyet = "";
            this.mesaj = "";
            this.onay = false;
          },
        },
      }).mount("#iletisimApp");
    </script>
