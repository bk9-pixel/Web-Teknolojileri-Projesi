                <!-- E-Posta -->

                  <label for="email" class="form-label fw-bold"

                  >

                    type="email"

                <!-- Şehir Seçimi (Select) -->
                <div class="mb-3">
                  <label for="sehir" class="form-label fw-bold">Şehriniz</label>

                <!-- Cinsiyet Seçimi (Radio) -->
                <div class="mb-3">

    <!-- Form Doğrulama (Validation) İçin Native JavaScript BURAYA TAŞINDI -->
    <script>
      document
        .getElementById("iletisimFormu")
        .addEventListener("submit", function (event) {
          // Kullanıcının girdiği değerleri alıyoruz (.trim() ile baştaki/sondaki boşlukları siliyoruz)
          const isim = document.getElementById("isim").value.trim();
          const soyisim = document.getElementById("soyisim").value.trim();
          const email = document.getElementById("email").value.trim();
          const mesaj = document.getElementById("mesaj").value.trim();

          // Hata mesajlarını biriktireceğimiz boş bir sepet (dizi) oluşturuyoruz
          let hatalar = [];

          // Boş alan kontrolleri
          if (isim === "") {
            hatalar.push("Adınızı girmeyi unuttunuz.");
          }
          if (soyisim === "") {
            hatalar.push("Soyadınızı girmeyi unuttunuz.");
          }

          // E-posta için hem boşluk hem de format kontrolü (içinde @ ve . var mı diye bakar)
          const emailSabloni = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
          if (email === "") {
            hatalar.push("E-posta adresinizi girmeyi unuttunuz.");
          } else if (!emailSabloni.test(email)) {
            hatalar.push(
              "Lütfen geçerli bir e-posta adresi girin (örnek: abc@mail.com).",
            );
          }

          if (mesaj === "") {
            hatalar.push("Mesaj alanını boş bırakamazsınız.");
          }

          // Eğer hata sepetimizde (dizide) eleman varsa, formu durdur ve uyar
          if (hatalar.length > 0) {
            event.preventDefault(); // Formun gitmesini ve sayfanın yenilenmesini engeller
            alert(
              "Gönderim Başarısız! Lütfen aşağıdaki eksikleri tamamlayın:\n\n- " +
                hatalar.join("\n- "),
            );
          }
        });
    </script>
